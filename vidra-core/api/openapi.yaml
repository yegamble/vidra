        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of notifications (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      summary: Get the caller's unread notification count
      description: Returns just the caller's unread notification count (for a badge).
      tags: [notifications]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The unread count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all the caller's notifications read
      description: Marks every unread notification read (idempotent).
      tags: [notifications]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: All notifications are marked read.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/notifications/{id}/read:
    post:
      operationId: markNotificationRead
      summary: Mark one notification read
      description: >-
        Marks one of the caller's notifications read (idempotent). An unknown id,
