# Vidra Core — OpenAPI contract (source of truth for the HTTP API).
#
# DRIFT STOP GUARD: this file MUST stay in lock-step with the routes registered
# in internal/httpapi. The TestOpenAPIContract test (internal/httpapi) fails the
# build when a route is added, removed, or renamed without a matching edit here,
# and the openapi.yml GitHub Actions workflow lints this file on every change.
#
# Editing rules for the drift guard's parser:
#   - `paths:` at column 0.
#   - each path item key indented 2 spaces (e.g. `  /healthz:`).
#   - each operation (get/post/put/patch/delete) indented 4 spaces.
# Keep that shape so the contract test can compare declared paths against the
# live Echo router. When you add an endpoint in code, document it here in the
# same change; when you remove one, delete its entry here in the same change.
openapi: 3.1.0
info:
  title: Vidra Core API
  version: 0.1.0
  description: >-
    HTTP API for Vidra — a clean-room, PeerTube-inspired federated video
    platform. This document is the authoritative contract consumed by the
    vidra-user frontend and validated in CI.
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /healthz:
    get:
      operationId: getLiveness
      summary: Liveness probe
      description: Reports that the process is up. Performs no dependency checks.
      tags: [system]
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /readyz:
    get:
      operationId: getReadiness
      summary: Readiness probe
      description: >-
        Reports whether all critical dependencies (PostgreSQL, Redis) are
        reachable. Returns 503 when any configured dependency is unhealthy.
      tags: [system]
      responses:
        "200":
          description: All configured dependencies are reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: At least one configured dependency is unhealthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /version:
    get:
      operationId: getVersion
      summary: Build version metadata
      description: >-
        Reports the running build's version, git commit, build date, and Go
        toolchain. Exposes build information only — never secrets or config.
      tags: [system]
      responses:
        "200":
          description: Build metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /api/v1/nodeinfo:
    get:
      operationId: getNodeInfo
      summary: Instance discovery metadata
      description: Minimal NodeInfo-style document describing this instance.
      tags: [system]
      responses:
        "200":
          description: Instance metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeInfoResponse"
  /api/v1/instance:
    get:
      operationId: getInstance
      summary: Public instance about/config
      description: >-
        Public "about this instance" document the frontend app shell reads on
        load: instance name, software, and whether public registration is open.
      tags: [system]
      responses:
        "200":
          description: Instance metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceResponse"
  /api/v1/auth/register:
    post:
      operationId: register
      summary: Register a new account
      description: >-
        Creates an account and returns it with an access token. The first
        account created on a fresh instance is granted the admin role. Rate
        limited; subject to the standard request guards.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Malformed request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Registration is disabled on this instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already taken.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Log in
      description: >-
        Verifies credentials and returns an access token. Unknown account and
        wrong password are reported identically (401) to prevent account
        enumeration.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account is disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/me:
    get:
      operationId: getCurrentUser
      summary: Current authenticated account
      description: >-
        Returns the account for the bearer access token. The user is reloaded
        from the database, so the response reflects current role/verification
        state rather than stale token claims.
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The authenticated account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCurrentUser
      summary: Update the authenticated account's profile
      description: >-
        Partial update of profile fields (display_name, bio). Identity fields
        (username, email) are not editable here. Provide at least one field.
      tags: [auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: The updated account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/refresh:
    post:
      operationId: refreshSession
      summary: Rotate a refresh token
      description: >-
        Exchanges a valid refresh token for a new access + refresh token pair and
        revokes the presented token (rotation). Reusing an already-rotated token
        is treated as compromise: all of the user's sessions are revoked.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: A new token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unknown, expired, or already-rotated refresh token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke a refresh-token session
      description: >-
        Revokes the session for the presented refresh token. Idempotent — an
        unknown or already-revoked token still returns 204 and never reveals
        whether the token existed.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: The session is revoked (or was already not active).
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/logout-all:
    post:
      operationId: logoutAll
      summary: Revoke all of the current user's sessions
      description: >-
        "Sign out everywhere" — revokes every active refresh-token session for
        the authenticated account. Requires a bearer access token.
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: All of the user's sessions are revoked.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/channels:
    post:
      operationId: createChannel
      summary: Create a channel
      description: Creates a channel owned by the authenticated user.
      tags: [channels]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Channel created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Handle already taken.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/channels/{handle}:
    get:
      operationId: getChannel
      summary: Get a channel by handle
      description: Public channel page data, looked up by case-insensitive handle.
      tags: [channels]
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The channel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: No channel with that handle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateChannel
      summary: Update a channel
      description: >-
        Updates a channel's mutable fields (owner only). Partial — only the
        fields present in the body are changed; the handle is immutable.
      tags: [channels]
      security:
        - bearerAuth: []
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelRequest"
      responses:
        "200":
          description: The updated channel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller does not own this channel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No channel with that handle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChannel
      summary: Delete a channel
      description: Deletes a channel (owner only).
      tags: [channels]
      security:
        - bearerAuth: []
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: The channel was deleted.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller does not own this channel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No channel with that handle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/channels/{handle}/follow:
    post:
      operationId: followChannel
      summary: Follow a channel
      description: The authenticated user follows the channel. Idempotent.
      tags: [channels]
      security:
        - bearerAuth: []
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Now following (or already was).
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No channel with that handle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unfollowChannel
      summary: Unfollow a channel
      description: The authenticated user stops following the channel. Idempotent.
      tags: [channels]
      security:
        - bearerAuth: []
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No longer following (or already was not).
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No channel with that handle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/channels:
    get:
      operationId: listMyChannels
      summary: List the authenticated user's channels
      tags: [channels]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The user's channels (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/channels/{handle}/videos:
    post:
      operationId: createVideo
      summary: Create a draft video
      description: >-
        Creates a draft video under a channel the caller owns. The video starts
        in the "draft" state; privacy defaults to "private" when omitted.
      tags: [videos]
      security:
        - bearerAuth: []
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVideoRequest"
      responses:
        "201":
          description: Draft created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller does not own this channel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No channel with that handle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listChannelVideos
      summary: List a channel's videos
      description: >-
        The channel owner (bearer token) sees all of their videos; everyone else
        sees only public ones.
      tags: [videos]
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The channel's videos (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"
        "404":
          description: No channel with that handle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/videos:
    get:
      operationId: listPublicVideos
      summary: Public video feed
      description: >-
        The cross-channel public video feed, newest first. No auth required.
        Paginated with limit (1–100, default 20) and offset (>= 0).
      tags: [videos]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of public videos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoFeedResponse"
  /api/v1/videos/search:
    get:
      operationId: searchVideos
      summary: Search public videos by title
      description: >-
        Fuzzy (trigram) search over public video titles, ranked by similarity
        then recency. No auth required. Requires a non-empty q (<= 100 chars);
        paginated with limit (1–100, default 20) and offset (>= 0).
      tags: [videos]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            maxLength: 100
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of matching public videos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoSearchResponse"
        "400":
          description: Missing or too-long q.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/videos/{id}:
    get:
      operationId: getVideo
      summary: Get a video by id
      description: >-
        Public and unlisted videos are returned to anyone with the id. A private
        video is returned only to its owner (with a bearer token); to everyone
        else it is reported as 404 so its existence is not revealed.
      tags: [videos]
      security:
        - bearerAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The video.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "404":
          description: No video with that id (or it is private and not yours).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateVideo
      summary: Update a video
      description: >-
        Partial update of a video's metadata (title, description, privacy), owner
        only. A non-owner or unknown id is reported as 404 so a private video's
        existence is not leaked. The handle is immutable.
      tags: [videos]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVideoRequest"
      responses:
        "200":
          description: The updated video.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such video, or not owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteVideo
      summary: Delete a video
      description: Deletes a video (owner only). Non-owner/unknown → 404.
      tags: [videos]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: The video was deleted.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such video, or not owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/videos/{id}/file:
    post:
      operationId: uploadVideoFile
      summary: Upload a video's original file
      description: >-
        Uploads the original media file for a video (owner only) as a multipart
        form with a single "file" part, stores it via the configured storage
        backend, and moves the video from draft to processing. Re-uploading
        replaces the previous original. A non-owner or unknown id is reported as
        404 so a private video's existence is not leaked. The file extension must
        be an accepted video container (otherwise 415); the body must be within
        UPLOAD_MAX_SIZE (otherwise 413). Transcoding into playable renditions
        happens asynchronously in a later stage.
      tags: [videos]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The original media file.
      responses:
        "201":
          description: The file was stored; the video is now processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadVideoFileResponse"
        "400":
          description: The multipart "file" field is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such video, or not owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: The uploaded file exceeds UPLOAD_MAX_SIZE.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: The file extension is not an accepted video container.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LivenessResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ComponentStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: One of ok, down, not_configured.
          example: ok
        error:
          type: string
          description: Present only when the component is down.
    ReadinessResponse:
      type: object
      required: [status, components]
      properties:
        status:
          type: string
          description: ok when all dependencies are reachable, otherwise degraded.
          example: ok
        components:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ComponentStatus"
    VersionResponse:
      type: object
      required: [name, version, commit, build_date, go]
      properties:
        name:
          type: string
          example: vidra
        version:
          type: string
          example: 0.1.0
        commit:
          type: string
          description: Short git SHA, or "unknown" when not built with ldflags.
          example: a1b2c3d
        build_date:
          type: string
          description: UTC build timestamp (RFC 3339), or "unknown".
          example: 2026-06-19T00:00:00Z
        go:
          type: string
          example: go1.26
    ErrorResponse:
      type: object
      description: >-
        The single, consistent error envelope returned by every endpoint for
        non-2xx responses (except the readiness probe, which returns
        ReadinessResponse on 503).
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable snake_case identifier for the error class.
              example: not_found
            message:
              type: string
              description: Human-readable description; never leaks internal detail on 5xx.
              example: resource not found
            request_id:
              type: string
              description: Correlates the response with server logs. Omitted when unknown.
            fields:
              type: array
              description: >-
                Field-level validation problems. Present only on validation
                failures (422 unprocessable_entity).
              items:
                type: object
                required: [field, message]
                properties:
                  field:
                    type: string
                    example: email
                  message:
                    type: string
                    example: must be a valid email
    InstanceResponse:
      type: object
      required: [name, description, software, registration_enabled, terms_url, privacy_url, contact_email]
      properties:
        name:
          type: string
          example: Vidra
        description:
          type: string
          description: Operator-provided short description; may be empty.
        software:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
              example: vidra
            version:
              type: string
              example: 0.1.0
        registration_enabled:
          type: boolean
          description: Whether public account signup is currently accepted.
        terms_url:
          type: string
          description: Link to the instance terms of service; may be empty.
        privacy_url:
          type: string
          description: Link to the instance privacy policy; may be empty.
        contact_email:
          type: string
          description: Operator contact email; may be empty.
    NodeInfoResponse:
      type: object
      required: [version, software, instance]
      properties:
        version:
          type: string
          description: NodeInfo schema version.
          example: "2.0"
        software:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
              example: vidra
            version:
              type: string
              example: 0.1.0
        instance:
          type: object
          required: [name]
          properties:
            name:
              type: string
    User:
      type: object
      required: [id, username, email, role, email_verified, display_name, bio, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: ada
        email:
          type: string
          example: ada@example.test
        role:
          type: string
          enum: [user, moderator, admin]
        email_verified:
          type: boolean
        display_name:
          type: string
          description: Human-facing name; may be empty.
          example: Ada L.
        bio:
          type: string
          description: Short free-text description; may be empty.
        created_at:
          type: string
          format: date-time
    UpdateProfileRequest:
      type: object
      description: Partial profile update; provide at least one field.
      properties:
        display_name:
          type: string
          maxLength: 50
        bio:
          type: string
          maxLength: 1000
    Channel:
      type: object
      required: [id, owner_id, handle, display_name, description, follower_count, created_at]
      properties:
        follower_count:
          type: integer
          format: int64
          description: Number of users following this channel.
          example: 0
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        handle:
          type: string
          example: ada_makes
        display_name:
          type: string
          example: Ada Makes
        description:
          type: string
        created_at:
          type: string
          format: date-time
    CreateChannelRequest:
      type: object
      required: [handle, display_name]
      properties:
        handle:
          type: string
          minLength: 3
          maxLength: 30
          description: 3–30 chars; letters, digits, or underscore.
          example: ada_makes
        display_name:
          type: string
          minLength: 1
          maxLength: 50
          example: Ada Makes
        description:
          type: string
          maxLength: 1000
    UpdateChannelRequest:
      type: object
      description: Partial update; provide at least one field. Handle is immutable.
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 50
        description:
          type: string
          maxLength: 1000
    ChannelListResponse:
      type: object
      required: [channels]
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
    Video:
      type: object
      required: [id, channel_id, title, description, privacy, state, created_at]
      properties:
        id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        title:
          type: string
          example: My first upload
        description:
          type: string
        privacy:
          type: string
          enum: [public, unlisted, private]
        state:
          type: string
          enum: [draft, processing, published, failed]
        created_at:
          type: string
          format: date-time
    CreateVideoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        privacy:
          type: string
          enum: [public, unlisted, private]
          description: Defaults to "private" when omitted.
    UpdateVideoRequest:
      type: object
      description: Partial update; provide at least one field.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        privacy:
          type: string
          enum: [public, unlisted, private]
    VideoListResponse:
      type: object
      required: [videos]
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
    VideoFeedResponse:
      type: object
      required: [videos, limit, offset]
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
    VideoSearchResponse:
      type: object
      required: [query, videos, limit, offset]
      properties:
        query:
          type: string
          example: go concurrency
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
    VideoFile:
      type: object
      description: >-
        A stored file backing a video. The storage key is internal and not
        exposed.
      required: [id, kind, content_type, original_name, size_bytes, created_at]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [original, rendition]
        content_type:
          type: string
          description: The client-declared MIME type (untrusted, for display only).
          example: video/mp4
        original_name:
          type: string
          description: The client-declared filename (untrusted, for display only).
          example: Clip.MP4
        size_bytes:
          type: integer
          format: int64
          description: Number of bytes actually stored.
          example: 10485760
        created_at:
          type: string
          format: date-time
    UploadVideoFileResponse:
      type: object
      required: [video, file]
      properties:
        video:
          $ref: "#/components/schemas/Video"
        file:
          $ref: "#/components/schemas/VideoFile"
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          example: ada
        email:
          type: string
          example: ada@example.test
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: ada@example.test
        password:
          type: string
          format: password
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: The opaque refresh token returned by register/login/refresh.
    AuthResponse:
      type: object
      required: [token, refresh_token, token_type, expires_in, user]
      properties:
        token:
          type: string
          description: Signed HS256 JWT access token.
        refresh_token:
          type: string
          description: Opaque rotating refresh token; store securely, send to /auth/refresh.
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access-token lifetime in seconds.
          example: 900
        user:
          $ref: "#/components/schemas/User"
