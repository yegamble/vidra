          type: string
          format: date-time
    AdminUserListResponse:
      type: object
      required: [users, limit, offset]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
    UpdateUserRequest:
      type: object
      description: Partial update; provide at least one field.
      properties:
        role:
          type: string
          enum: [user, moderator, admin]
        is_active:
          type: boolean
    VideoFile:
      type: object
      description: >-
        A stored file backing a video. The storage key is internal and not
        exposed.
      required: [id, kind, content_type, original_name, size_bytes, created_at]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [original, rendition]
        content_type:
          type: string
          description: The client-declared MIME type (untrusted, for display only).
          example: video/mp4
        original_name:
          type: string
          description: The client-declared filename (untrusted, for display only).
          example: Clip.MP4
        size_bytes:
          type: integer
          format: int64
          description: Number of bytes actually stored.
          example: 10485760
        created_at:
          type: string
          format: date-time
    UploadVideoFileResponse:
      type: object
      required: [video, file]
      properties:
        video:
          $ref: "#/components/schemas/Video"
        file:
          $ref: "#/components/schemas/VideoFile"
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          example: ada
        email:
          type: string
          example: ada@example.test
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: ada@example.test
        password:
          type: string
          format: password
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: The opaque refresh token returned by register/login/refresh.
    AuthResponse:
      type: object
      required: [token, refresh_token, token_type, expires_in, user]
      properties:
        token:
          type: string
          description: Signed HS256 JWT access token.
        refresh_token:
          type: string
          description: Opaque rotating refresh token; store securely, send to /auth/refresh.
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access-token lifetime in seconds.
          example: 900
        user:
          $ref: "#/components/schemas/User"
