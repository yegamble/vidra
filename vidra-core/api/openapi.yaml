          description: What happened. follow = someone followed your channel; comment = someone commented on your video.
        read:
          type: boolean
        created_at:
          type: string
          format: date-time
        actor:
          $ref: "#/components/schemas/NotificationActor"
        channel_handle:
          type: string
          description: Followed channel's handle (follow notifications).
        channel_display_name:
          type: string
          description: Followed channel's display name (follow notifications).
        video_id:
          type: string
          format: uuid
          description: Commented video's id (comment notifications).
        video_title:
          type: string
          description: Commented video's title (comment notifications).
        comment_id:
          type: string
          format: uuid
          description: The comment's id (comment notifications).
    NotificationListResponse:
      type: object
