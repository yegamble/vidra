      tags: [notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: The notification is marked read.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such notification for this user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/playlists:
    post:
      operationId: createPlaylist
      summary: Create a playlist
      description: Creates a named playlist owned by the caller. Visibility defaults to private.
      tags: [playlists]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaylistRequest"
      responses:
        "201":
          description: The created playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/playlists:
    get:
      operationId: listMyPlaylists
      summary: List the caller's playlists
      description: Returns the caller's playlists, newest first, each with its public video count.
      tags: [playlists]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The caller's playlists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistListResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/playlists/{id}:
    get:
      operationId: getPlaylist
      summary: Get a playlist and its videos
      description: >-
        Returns a playlist with its ordered public, published video cards.
        Public/unlisted playlists are visible to anyone; a private playlist is
        visible only to its owner (otherwise 404).
      tags: [playlists]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The playlist and its videos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDetailResponse"
        "404":
          description: No such (visible) playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePlaylist
      summary: Update a playlist
      description: Partial update of a playlist owned by the caller; provide at least one field.
      tags: [playlists]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaylistRequest"
      responses:
        "200":
          description: The updated playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such playlist owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePlaylist
      summary: Delete a playlist
      description: Deletes a playlist owned by the caller.
      tags: [playlists]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: The playlist is deleted.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such playlist owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/playlists/{id}/videos:
    post:
      operationId: addPlaylistItem
      summary: Add a video to a playlist
      description: >-
        Appends a public, published video to a playlist owned by the caller
        (idempotent). A non-public/unpublished or unknown video is 404.
      tags: [playlists]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPlaylistItemRequest"
      responses:
        "204":
          description: The video is in the playlist.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such playlist (owned by the caller) or video.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/playlists/{id}/videos/{videoId}:
    delete:
      operationId: removePlaylistItem
      summary: Remove a video from a playlist
      description: Removes a video from a playlist owned by the caller (idempotent).
      tags: [playlists]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: videoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: The video is no longer in the playlist.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such playlist owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/videos/{id}/report:
    post:
      operationId: reportVideo
      summary: Report a video
      description: >-
        Files an abuse report against a public, published video (idempotent per
        reporter). A non-public/unpublished or unknown video is 404.
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "204":
          description: The report was filed (or already existed).
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such public, published video.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/comments/{id}/report:
    post:
      operationId: reportComment
      summary: Report a comment
      description: Files an abuse report against a comment (idempotent per reporter).
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "204":
          description: The report was filed (or already existed).
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/reports:
    get:
      operationId: listReports
      summary: List the moderation queue
      description: >-
        Returns abuse reports, newest first, with the reporter and target
        context. Restricted to moderators/admins. status=open returns only
        unresolved reports. Paginated via limit (1–100, default 20) and offset.
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Set to "open" to return only unresolved reports.
          schema:
            type: string
            enum: [open]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of reports (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller is not a moderator or admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/reports/{id}/resolve:
    post:
      operationId: resolveReport
      summary: Resolve a report
      description: >-
        Marks a report accepted or rejected with an internal moderator note.
        Restricted to moderators/admins. An unknown id is 404.
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveReportRequest"
      responses:
        "204":
          description: The report was resolved.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller is not a moderator or admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/videos/blocked:
    get:
      operationId: listBlockedVideos
      summary: List blocked videos
      description: >-
        Returns currently-blocked videos, newest block first, with the owning
        channel, the block reason, who blocked it, and when — for the moderation
        block-list. Restricted to moderators/admins. Paginated via limit (1–100,
        default 20) and offset.
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of blocked videos (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedVideoListResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller is not a moderator or admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/videos/{id}/block:
    post:
      operationId: blockVideo
      summary: Block a video
      description: >-
        Blocks a video so it is removed from all public surfaces (feed, search,
        channel listings, subscriptions, the watch/detail endpoint, media
        streaming, and public interactions). Moderators/admins can still view a
        blocked video. Restricted to moderators/admins. Idempotent. An unknown id
        is 404.
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockVideoRequest"
      responses:
        "204":
          description: The video was blocked.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller is not a moderator or admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such video.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unblockVideo
      summary: Unblock a video
      description: >-
        Lifts a video's block, restoring it to public surfaces. Restricted to
        moderators/admins. Idempotent (unblocking a video that is not blocked
        still succeeds).
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: The video is not blocked (it was unblocked, or already was).
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller is not a moderator or admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/mutes/accounts:
    get:
      operationId: listMutedAccounts
      summary: List muted accounts
      description: >-
        Returns the accounts the caller has muted, newest mute first. Requires
        authentication. Paginated via limit (1–100, default 20) and offset.
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of muted accounts (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MutedAccountListResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me/mutes/accounts/{id}:
    post:
      operationId: muteAccount
      summary: Mute an account
      description: >-
        Mutes another account so its content becomes hidden from the caller.
        Requires authentication. Idempotent. Muting yourself is 422; an unknown
        target account is 404.
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: The account is muted.
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Cannot mute yourself.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unmuteAccount
      summary: Unmute an account
      description: >-
        Lifts the caller's mute of another account. Requires authentication.
        Idempotent (unmuting a not-muted account still succeeds).
      tags: [moderation]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: The account is not muted (it was unmuted, or already was).
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/users:
    get:
      operationId: listUsers
      summary: List accounts (admin)
      description: >-
        Returns accounts, newest first, optionally filtered by a username/email
        substring (q). Restricted to admins. Paginated via limit (1–100, default
        20) and offset.
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: Username/email substring filter.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of accounts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller is not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/users/{id}:
    patch:
      operationId: updateUser
      summary: Edit a user's role / active flag (admin)
      description: >-
        Updates a user's role and/or active flag (partial). Restricted to admins.
        An admin cannot demote or deactivate their own account (422). An unknown
        id is 404. Deactivating revokes the user's sessions.
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: The updated account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The caller is not an admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No such user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed, or an attempt to self-demote/deactivate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LivenessResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ComponentStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: One of ok, down, not_configured.
          example: ok
        error:
          type: string
          description: Present only when the component is down.
    ReadinessResponse:
      type: object
      required: [status, components]
      properties:
        status:
          type: string
          description: ok when all dependencies are reachable, otherwise degraded.
          example: ok
        components:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ComponentStatus"
    VersionResponse:
      type: object
      required: [name, version, commit, build_date, go]
      properties:
        name:
          type: string
          example: vidra
        version:
          type: string
          example: 0.1.0
        commit:
          type: string
          description: Short git SHA, or "unknown" when not built with ldflags.
          example: a1b2c3d
        build_date:
          type: string
          description: UTC build timestamp (RFC 3339), or "unknown".
          example: 2026-06-19T00:00:00Z
        go:
          type: string
          example: go1.26
    ErrorResponse:
      type: object
      description: >-
        The single, consistent error envelope returned by every endpoint for
        non-2xx responses (except the readiness probe, which returns
        ReadinessResponse on 503).
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable snake_case identifier for the error class.
              example: not_found
            message:
              type: string
              description: Human-readable description; never leaks internal detail on 5xx.
              example: resource not found
            request_id:
              type: string
              description: Correlates the response with server logs. Omitted when unknown.
            fields:
              type: array
              description: >-
                Field-level validation problems. Present only on validation
                failures (422 unprocessable_entity).
              items:
                type: object
                required: [field, message]
                properties:
                  field:
                    type: string
                    example: email
                  message:
                    type: string
                    example: must be a valid email
    InstanceResponse:
      type: object
      required: [name, description, software, registration_enabled, terms_url, privacy_url, contact_email]
      properties:
        name:
          type: string
          example: Vidra
        description:
          type: string
          description: Operator-provided short description; may be empty.
        software:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
              example: vidra
            version:
              type: string
              example: 0.1.0
        registration_enabled:
          type: boolean
          description: Whether public account signup is currently accepted.
        terms_url:
          type: string
          description: Link to the instance terms of service; may be empty.
        privacy_url:
          type: string
          description: Link to the instance privacy policy; may be empty.
        contact_email:
          type: string
          description: Operator contact email; may be empty.
    NodeInfoResponse:
      type: object
      required: [version, software, instance]
      properties:
        version:
          type: string
          description: NodeInfo schema version.
          example: "2.0"
        software:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
              example: vidra
            version:
              type: string
              example: 0.1.0
        instance:
          type: object
          required: [name]
          properties:
            name:
              type: string
    User:
      type: object
      required: [id, username, email, role, email_verified, display_name, bio, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          example: ada
        email:
          type: string
          example: ada@example.test
        role:
          type: string
          enum: [user, moderator, admin]
        email_verified:
          type: boolean
        display_name:
          type: string
          description: Human-facing name; may be empty.
          example: Ada L.
        bio:
          type: string
          description: Short free-text description; may be empty.
        created_at:
          type: string
          format: date-time
    UpdateProfileRequest:
      type: object
      description: Partial profile update; provide at least one field.
      properties:
        display_name:
          type: string
          maxLength: 50
        bio:
          type: string
          maxLength: 1000
    Channel:
      type: object
      required: [id, owner_id, handle, display_name, description, follower_count, created_at]
      properties:
        follower_count:
          type: integer
          format: int64
          description: Number of users following this channel.
          example: 0
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        handle:
          type: string
          example: ada_makes
        display_name:
          type: string
          example: Ada Makes
        description:
          type: string
        created_at:
          type: string
          format: date-time
    CreateChannelRequest:
      type: object
      required: [handle, display_name]
      properties:
        handle:
          type: string
          minLength: 3
          maxLength: 30
          description: 3–30 chars; letters, digits, or underscore.
          example: ada_makes
        display_name:
          type: string
          minLength: 1
          maxLength: 50
          example: Ada Makes
        description:
          type: string
          maxLength: 1000
    UpdateChannelRequest:
      type: object
      description: Partial update; provide at least one field. Handle is immutable.
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 50
        description:
          type: string
          maxLength: 1000
    ChannelListResponse:
      type: object
      required: [channels]
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
    Video:
      type: object
      required: [id, channel_id, title, description, privacy, state, created_at]
      properties:
        id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        channel_handle:
          type: string
          description: >-
            The owning channel's handle, present on card/feed views so the client
            can link to /channels/{handle}. Omitted on the detail view.
        channel_display_name:
          type: string
          description: The owning channel's display name; present alongside channel_handle on card/feed views.
        title:
          type: string
          example: My first upload
        description:
          type: string
        privacy:
          type: string
          enum: [public, unlisted, private]
        state:
          type: string
          enum: [draft, processing, published, failed]
        created_at:
          type: string
          format: date-time
        duration_seconds:
          type:
            - integer
            - "null"
          description: >-
            Probed duration in whole seconds. Present on the detail endpoint once
            a media probe has recorded it; omitted when unknown.
        width:
          type:
            - integer
            - "null"
          description: Probed pixel width; omitted when unknown (e.g. audio-only).
        height:
          type:
            - integer
            - "null"
          description: Probed pixel height; omitted when unknown (e.g. audio-only).
        has_thumbnail:
          type: boolean
          description: >-
            Whether a poster image is available at GET /videos/{id}/thumbnail.
            Present on the detail endpoint; omitted on list/feed views.
        views:
          type: integer
          format: int64
          description: >-
            Recorded view count. Present on the detail endpoint; omitted on
            list/feed views.
    CreateVideoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        privacy:
          type: string
          enum: [public, unlisted, private]
          description: Defaults to "private" when omitted.
    UpdateVideoRequest:
      type: object
      description: Partial update; provide at least one field.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        privacy:
          type: string
          enum: [public, unlisted, private]
    Comment:
      type: object
      required: [id, video_id, body, author_id, author_username, author_display_name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
        body:
          type: string
        author_id:
          type: string
          format: uuid
          description: The comment author's account id (so a signed-in viewer can mute them).
        author_username:
          type: string
        author_display_name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CommentListResponse:
      type: object
      required: [comments, limit, offset]
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        limit:
          type: integer
        offset:
          type: integer
    MutedAccount:
      type: object
      description: An account the caller has muted, with its display identity.
      required: [user_id, username, display_name, muted_at]
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        muted_at:
          type: string
          format: date-time
    MutedAccountListResponse:
      type: object
      required: [accounts, limit, offset]
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/MutedAccount"
        limit:
          type: integer
        offset:
          type: integer
    VideoRating:
      type: object
      required: [like_count, dislike_count, my_rating]
      properties:
        like_count:
          type: integer
          format: int64
        dislike_count:
          type: integer
          format: int64
        my_rating:
          type: [string, "null"]
          enum: [like, dislike, null]
          description: The caller's own rating, or null when anonymous or unrated.
    VideoListResponse:
      type: object
      required: [videos]
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
    VideoFeedResponse:
      type: object
      required: [videos, sort, limit, offset]
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        sort:
          type: string
          enum: [recent, popular, trending]
          description: The ordering actually applied (normalised from the request).
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
    VideoSearchResponse:
      type: object
      required: [query, videos, limit, offset]
      properties:
        query:
          type: string
          example: go concurrency
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
    WatchProgressRequest:
      type: object
      required: [position_seconds]
      properties:
        position_seconds:
          type: integer
          format: int32
          minimum: 0
          description: Playback position in whole seconds.
          example: 42
    WatchProgress:
      type: object
      required: [video_id, position_seconds]
      properties:
        video_id:
          type: string
          format: uuid
        position_seconds:
          type: integer
          format: int32
          description: The caller's saved resume position in whole seconds (0 when none).
          example: 42
    HistoryItem:
      description: >-
        A watch-history card: a video card plus the caller's saved resume
        position and when they last watched it.
      allOf:
        - $ref: "#/components/schemas/Video"
        - type: object
          required: [position_seconds, watched_at]
          properties:
            position_seconds:
              type: integer
              format: int32
              description: The caller's saved resume position in whole seconds.
              example: 42
            watched_at:
              type: string
              format: date-time
              description: When the caller last watched this video.
    WatchHistoryResponse:
      type: object
      required: [videos, limit, offset]
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/HistoryItem"
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
    NotificationActor:
      type: object
      required: [username, display_name]
      properties:
        username:
          type: string
        display_name:
          type: string
    Notification:
      type: object
      required: [id, type, read, created_at]
