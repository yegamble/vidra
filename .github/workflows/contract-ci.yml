name: contract-ci

# Frontend <-> backend contract drift guard. Fails when the vidra-user API client
# (lib/api/*.ts) references an /api/ path that no longer exists in vidra-core's
# OpenAPI spec (path params compared structurally, so it is name-agnostic and not
# flaky). It does NOT yet check methods/field shapes — that needs generated types.
#
# Cross-project by nature, so it lives in its own workflow rather than either
# project's canonical gate, and triggers on changes to EITHER side of the contract.
# Additive: it does not weaken backend-ci/frontend-ci, so ci-guard stays satisfied.
on:
  push:
    branches: [main]
    paths:
      - "vidra-user/lib/api/**"
      - "vidra-user/scripts/check-contract.mjs"
      - "vidra-core/api/openapi.yaml"
      - ".github/workflows/contract-ci.yml"
  pull_request:
    paths:
      - "vidra-user/lib/api/**"
      - "vidra-user/scripts/check-contract.mjs"
      - "vidra-core/api/openapi.yaml"
      - ".github/workflows/contract-ci.yml"

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check frontend<->backend path contract
        run: node vidra-user/scripts/check-contract.mjs
