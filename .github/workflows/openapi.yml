name: openapi

# Monorepo: this workflow lives at the repo root (GitHub only reads workflows
# here) but validates the vidra-core/ OpenAPI contract. It is the CI half of the
# documentation stop guard:
#   1. lint  — the spec must be a valid, clean OpenAPI document (Redocly).
#   2. drift — the routes registered in internal/httpapi must match the spec
#              exactly (TestOpenAPIContract), so an endpoint added or removed in
#              code without a matching spec edit fails the build.
# Path filters keep it from running on unrelated changes.
on:
  push:
    branches: [main]
    paths:
      - "vidra-core/api/openapi.yaml"
      - "vidra-core/internal/httpapi/**"
      - ".github/workflows/openapi.yml"
  pull_request:
    paths:
      - "vidra-core/api/openapi.yaml"
      - "vidra-core/internal/httpapi/**"
      - ".github/workflows/openapi.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: vidra-core

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check the OpenAPI contract exists
        run: |
          if [ ! -f api/openapi.yaml ]; then
            echo "::error::vidra-core/api/openapi.yaml is missing. The HTTP API contract must be maintained." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint the OpenAPI contract (Redocly)
        run: npx --yes @redocly/cli@latest lint api/openapi.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: vidra-core/go.sum

      - name: Verify routes match the OpenAPI contract (drift guard)
        run: make openapi-verify
