name: ci-guard

# CI integrity / parity monitor. Guards the OTHER workflows so a green check on
# GitHub means the same gate that passes locally actually ran — not a workflow
# quietly weakened to pass. It runs on every change to the workflows themselves
# (and on demand), and fails when:
#   1. a workflow hides failures with `continue-on-error: true`
#      (escape hatch: annotate the line with `# ci-guard:allow` for a job the
#       team has explicitly decided is experimental),
#   2. backend-ci.yml does not invoke the canonical `make ci` gate,
#   3. frontend-ci.yml exists but does not invoke the canonical `npm run ci`/`make ci`.
# Keeping CI in terms of the canonical per-project gate is what makes
# "passes locally" == "passes in GitHub".
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  pull_request:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No hidden failures (continue-on-error)
        run: |
          bad=$(grep -rnE '^[[:space:]]*continue-on-error:[[:space:]]*true' .github/workflows \
            | grep -v 'ci-guard:allow' || true)
          if [ -n "$bad" ]; then
            echo "::error::continue-on-error: true hides failures. Remove it, or mark the line '# ci-guard:allow' if the job is intentionally experimental:" >&2
            echo "$bad" >&2
            exit 1
          fi
          echo "OK: no unmarked continue-on-error."

      - name: Backend CI runs the canonical gate
        run: |
          if ! grep -Eq 'make ci' .github/workflows/backend-ci.yml; then
            echo "::error::backend-ci.yml must run 'make ci' so CI mirrors the local gate exactly." >&2
            exit 1
          fi
          echo "OK: backend-ci.yml invokes 'make ci'."

      - name: Frontend CI (if present) runs the canonical gate
        run: |
          f=.github/workflows/frontend-ci.yml
          if [ -f "$f" ]; then
            if ! grep -Eq 'npm run ci|pnpm run ci|make ci' "$f"; then
              echo "::error::frontend-ci.yml must run the canonical gate ('npm run ci') so CI mirrors local." >&2
              exit 1
            fi
            echo "OK: frontend-ci.yml invokes the canonical gate."
          else
            echo "frontend-ci.yml not present yet (frontend not scaffolded) — skipping."
          fi
