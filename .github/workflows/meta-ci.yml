name: meta-ci

# Validates the meta-repo itself: bootstrap.sh is a sane script and the full-stack
# docker-compose (which `include:`s vidra-core's compose) resolves correctly.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint bootstrap.sh
        run: |
          bash -n bootstrap.sh
          if command -v shellcheck >/dev/null 2>&1; then shellcheck bootstrap.sh || true; fi

      # docker-compose.yml `include:`s ./vidra-core/docker-compose.yml and builds the
      # frontend from ./vidra-user, so both repos must be present to resolve the full
      # config. Check them out the way bootstrap.sh would (public, no token needed).
      - name: Check out vidra-core (compose include)
        uses: actions/checkout@v4
        with:
          repository: yegamble/vidra-core
          path: vidra-core

      - name: Check out vidra-user (compose build context)
        uses: actions/checkout@v4
        with:
          repository: yegamble/vidra-user
          path: vidra-user

      - name: Validate full-stack compose resolves (backend + frontend)
        run: docker compose --profile core --profile web config -q

      - name: bootstrap.sh sees vidra-core already present (idempotent path)
        run: |
          # vidra-core is checked out above; bootstrap should treat it as present.
          test -d vidra-core/.git && echo "OK: vidra-core is a git checkout."
