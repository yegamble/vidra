# Full local stack for Vidra.
#
# Brings up the vidra-core backend (postgres, redis, migrate, api) by INCLUDING
# vidra-core's own compose file, so this stays a thin wrapper with the backend
# definition living in exactly one place (vidra-core/docker-compose.yml). All of
# vidra-core's profiles (core, storage, ...) work from here unchanged.
#
# Run ./bootstrap.sh first so ./vidra-core and ./vidra-user exist, then:
#
#   make dev            # backend stack up; frontend via `npm run dev` for HMR
#   make up             # backend stack + the containerised frontend (:3000)
#
# or raw compose:
#   docker compose --profile core up --build
#   docker compose --profile core --profile frontend up --build
#
# Environments: pass one of the env templates (see .ralph/specs/environments.md):
#   docker compose --env-file env/local.env --profile core --profile frontend up -d
#
# NOTE: NEXT_PUBLIC_API_BASE_URL is baked into the frontend image at BUILD time
# (Next.js inlines NEXT_PUBLIC_* into the client bundle) — changing it requires
# rebuilding the frontend image, not just restarting it.
include:
  - path: ./vidra-core/docker-compose.yml

services:
  # The api service is DEFINED in the included vidra-core/docker-compose.yml. It is
  # EXTENDED with the vidra-search wiring (SEARCH_SERVICE_URL + SEARCH_INTERNAL_SECRET)
  # in docker-compose.override.yml — NOT here — because redeclaring an included
  # service inside the SAME file that `include:`s it is rejected by some Compose
  # versions ("services.api conflicts with imported resource"). The override file is
  # auto-loaded by every plain `docker compose` command; see its header for details.
  frontend:
    profiles: ["frontend"]
    build:
      context: ./vidra-user
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      # Server Components call the API over compose DNS; the browser keeps
      # using NEXT_PUBLIC_API_BASE_URL through the host-published port.
      INTERNAL_API_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # One-shot search-schema migration. vidra-search shares the core `vidra`
  # database but lives in its own `search` schema (migration 0001 creates it).
  # The x-migrations-table URL param lands golang-migrate's version ledger in
  # `vidra_search_migrations` (in public) so it never collides with core's
  # `schema_migrations`. Joins the `core` profile so `make dev`/`dev-hot` run it.
  search-migrate:
    image: migrate/migrate:v4.19.1
    profiles: ["core"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./vidra-search/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-vidra}:${POSTGRES_PASSWORD:-vidra}@postgres:5432/${POSTGRES_DB:-vidra}?sslmode=disable&x-migrations-table=vidra_search_migrations"
      - "up"

  # vidra-search: internal autosuggest / search / recommendations service. Only
  # vidra-core talks to it (HMAC S2S); it is NEVER exposed to the browser. Shares
  # the core Postgres (schema `search`) and Redis (DB index 1). Env mirrors the
  # api service style: VIDRA_ENV overridable, HTTP_PORT fixed to the in-container
  # 8080; LOG_LEVEL/LOG_FORMAT/METRICS_ENABLED are left to the service's config
  # defaults exactly like the api service (no explicit override here).
  search:
    build: ./vidra-search
    profiles: ["core"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      search-migrate:
        condition: service_completed_successfully
    environment:
      VIDRA_ENV: ${VIDRA_ENV:-development}
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-vidra}:${POSTGRES_PASSWORD:-vidra}@postgres:5432/${POSTGRES_DB:-vidra}?sslmode=disable
      REDIS_URL: redis://redis:6379/1
      # Shared HMAC secret for core↔search auth. Compose-local dev default ONLY;
      # a real deployment sets a strong (>=32 byte) value and never commits it.
      # MUST match the api service's SEARCH_INTERNAL_SECRET above.
      INTERNAL_SECRET: ${SEARCH_INTERNAL_SECRET:-dev-insecure-internal-secret-change-me-0000}
    ports:
      - "${SEARCH_HTTP_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
